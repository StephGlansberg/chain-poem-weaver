name: Mini App CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mini-app-ci
  cancel-in-progress: true

jobs:
  mini-app-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Static checks
        run: npm test
        env:
          MINIAPP_ORIGIN: https://chain-poem-weaver.vercel.app

      - name: Build production
        run: npm run build:production
        env:
          MINIAPP_ORIGIN: https://chain-poem-weaver.vercel.app

      - name: Dist checks
        run: npm run test:dist
        env:
          MINIAPP_ORIGIN: https://chain-poem-weaver.vercel.app

      - name: Vercel Git integration reminder
        run: |
          echo "CI completed. Vercel production deployment is owned by the connected Git integration for StephGlansberg/chain-poem-weaver."
          echo "Optional client acceptance step: open the Mini App in Farcaster/Base and, if needed, fill data/client-verification.json."
