name: Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  production-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Static checks
        run: npm test
        env:
          MINIAPP_ORIGIN: https://chain-poem-weaver.vercel.app

      - name: Build production
        run: npm run build:production
        env:
          MINIAPP_ORIGIN: https://chain-poem-weaver.vercel.app

      - name: Dist checks
        run: npm run test:dist
        env:
          MINIAPP_ORIGIN: https://chain-poem-weaver.vercel.app

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Vercel deploy
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          MINIAPP_ORIGIN: https://chain-poem-weaver.vercel.app

      - name: Post-deploy verification reminder
        run: |
          echo "Production deploy completed."
          echo "Next human/client acceptance step: open the Mini App in Farcaster/Base and, if needed, fill data/client-verification.json."
